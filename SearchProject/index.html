<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Project</title>
    <style>
        *{
            padding:0px;
            margin:0px;
            box-sizing:border-box;

        }
        nav{
            height:70px;
            background-color:black;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        input{
            width:500px;
            padding:10px;
            border-radius: 10px;
            border:none;
            letter-spacing: 2px;
            font-weight: bold;
            font-size: 17px;
            outline: none;
        }
        main{
            background-color: bisque;
            min-height: calc(100vh);
            padding:20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap:10px;

        }
        li{
            list-style: none;
            letter-spacing: 2px;
            font-size: medium;
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-weight: bold;

        }
        main>li:nth-child(2n){
            background-color: rgb(65, 13, 13);
            color: white;
            border-radius: 3px;
            padding: 10px;
        }
        main>li:nth-child(2n+1){
            background-color: rgb(238, 166, 166);
            color: rgb(2, 2, 2);
            border-radius: 3px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <input type="text">
    </nav>
    <main>

    </main>
    <script src="./script.js"></script>
</body>
</html>
